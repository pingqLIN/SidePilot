name: CI

on:
  push:
    branches: ["main", "OH.NO"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            scripts/copilot-bridge/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Test extension
        run: npm test

      - name: Verify integrity seal
        run: npm run integrity:verify

      - name: Install dependencies
        working-directory: ./scripts/copilot-bridge
        run: npm ci

      - name: Build
        working-directory: ./scripts/copilot-bridge
        run: npm run build
