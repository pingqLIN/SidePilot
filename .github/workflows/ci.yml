name: CI

on:
  push:
    branches: ["main", "OH.NO"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "scripts/copilot-bridge/package-lock.json"

      - name: Install dependencies
        working-directory: ./scripts/copilot-bridge
        run: npm ci

      - name: Build
        working-directory: ./scripts/copilot-bridge
        run: npm run build --if-present

      - name: Test
        working-directory: ./scripts/copilot-bridge
        run: npm test --if-present
